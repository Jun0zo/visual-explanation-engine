<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gradient Definition Cards Baseline</title>
  <style>
    :root { --bg:#111821; --panel:#192332; --line:#2e4057; --ink:#f1f6ff; --muted:#a8b4c3; --purple:#8b6cf6; --green:#17a37e; }
    * { box-sizing:border-box; }
    body { margin:0; background:linear-gradient(#142033, #0f151e); color:var(--ink); font-family:ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { max-width:1240px; margin:0 auto; padding:56px 44px; }
    h1 { font-size:58px; margin:0 0 16px; letter-spacing:0; }
    p { color:var(--muted); font-size:19px; line-height:1.65; margin:0; }
    .layout { display:grid; grid-template-columns:.9fr 1.1fr; gap:24px; margin-top:34px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 18px 50px rgba(0,0,0,.22); }
    .cards { display:grid; gap:18px; }
    h2 { margin:0 0 12px; font-size:26px; }
    .formula { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; padding:18px; background:#101824; border:1px solid #334960; border-radius:14px; color:#d7e5ff; font-size:20px; margin-top:16px; }
    .graph { height:470px; display:grid; place-items:center; }
    svg { width:100%; height:100%; }
    button { margin-top:20px; border:1px solid var(--line); background:#101824; color:var(--ink); border-radius:14px; padding:14px 18px; font-weight:900; font-size:16px; }
  </style>
</head>
<body>
  <main>
    <h1>Gradient Descent는 기울기를 따라 내려가는 방법입니다</h1>
    <p>현재 위치에서 기울기를 계산하고, 학습률을 곱한 만큼 반대 방향으로 이동합니다. 이 과정을 반복하면 손실이 작아집니다.</p>
    <section class="layout">
      <div class="cards">
        <div class="card" data-side-card><h2>기울기</h2><p>함수의 어느 방향이 올라가는지 알려주는 값입니다. 우리는 반대 방향으로 이동합니다.</p><div class="formula">gradient = df/dx</div></div>
        <div class="card" data-side-card><h2>학습률</h2><p>한 번에 얼마나 움직일지 정하는 숫자입니다. 너무 크면 지나치고 너무 작으면 느립니다.</p><div class="formula">x_next = x - η·gradient</div></div>
        <div class="card" data-side-card><h2>반복</h2><p>작은 이동을 여러 번 반복하면 최솟값 근처에 도착합니다.</p><button data-eval-action>설명 바꾸기</button></div>
      </div>
      <div class="card graph" data-visual>
        <svg viewBox="0 0 620 420" aria-label="작은 손실 함수 그래프">
          <path d="M50 360 C150 330 210 230 300 210 C390 190 430 320 570 80" fill="none" stroke="#8b6cf6" stroke-width="7"/>
          <circle cx="430" cy="285" r="14" fill="#17a37e"/>
          <text x="396" y="325" fill="#f1f6ff" font-size="18" font-weight="900">현재 위치</text>
        </svg>
      </div>
    </section>
  </main>
  <script>
    document.querySelector('[data-eval-action]').addEventListener('click', () => {
      document.querySelector('.cards .card:last-child p').textContent = '여전히 설명 카드만 바뀌고 그래프의 점은 움직이지 않습니다.';
    });
  </script>
</body>
</html>
