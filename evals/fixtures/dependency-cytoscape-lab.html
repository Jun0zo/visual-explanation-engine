<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dependency Cytoscape Candidate</title>
  <script src="../../node_modules/cytoscape/dist/cytoscape.min.js"></script>
  <style>
    :root { --paper:#fbfcf8; --ink:#1f2924; --muted:#68756e; --grid:#e5eee8; --line:#cbd9d1; --red:#c94d4d; --orange:#d98916; --green:#10866f; --blue:#2c69d8; --purple:#6e58d9; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; overflow:hidden; color:var(--ink); background:var(--paper); font-family:ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .stage { position:relative; min-height:100vh; padding:28px 36px; background-image:linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px); background-size:42px 42px; }
    h1 { margin:0; font-size:34px; letter-spacing:0; }
    .hint { margin-top:7px; max-width:820px; color:var(--muted); font-size:17px; line-height:1.45; }
    .toolbar { position:absolute; right:34px; top:28px; display:flex; align-items:center; gap:10px; padding:8px; border:1px solid #cbd8d1; border-radius:999px; background:rgba(251,252,248,.86); backdrop-filter:blur(10px); z-index:6; }
    button { border:0; border-radius:999px; padding:10px 15px; background:transparent; color:var(--ink); font-weight:900; }
    button[data-eval-action] { background:var(--ink); color:#fff; }
    #cy { position:absolute; left:34px; right:34px; top:104px; bottom:36px; }
    .callout { position:absolute; max-width:292px; padding:8px 10px; border-left:4px solid var(--red); background:rgba(251,252,248,.78); font-weight:850; line-height:1.35; z-index:5; }
    .callout small { display:block; margin-top:4px; color:var(--muted); font-weight:720; }
    .c1 { left:92px; top:178px; border-color:var(--green); }
    .c2 { right:110px; top:196px; }
    .c3 { right:120px; bottom:126px; border-color:var(--orange); }
    .legend { position:absolute; left:72px; bottom:44px; display:flex; gap:18px; color:var(--muted); font-size:13px; font-weight:850; z-index:5; }
    .legend i { display:inline-block; width:12px; height:12px; margin-right:6px; border-radius:50%; vertical-align:-1px; }
    .green { background:var(--green); } .red { background:var(--red); } .orange { background:var(--orange); } .blue { background:var(--blue); }
  </style>
</head>
<body>
  <main class="stage" data-state-target data-mode="normal">
    <h1>의존성 충돌은 그래프 라이브러리로 탐색해야 한다</h1>
    <div class="hint">Cytoscape가 레이아웃, hit-testing, 선택, 이웃 강조를 맡고 설명은 충돌 노드와 경로에 붙습니다.</div>
    <div class="toolbar" data-floating-toolbar><button>전체 그래프</button><button data-eval-action>충돌 경로 강조</button></div>
    <div id="cy" data-visual data-library-visual aria-label="cytoscape dependency graph"></div>
    <div class="callout c1" data-annotation>시작점은 app <small>직접 의존성과 transitive dependency를 한 그래프에서 따라갑니다.</small></div>
    <div class="callout c2" data-annotation>충돌은 Rollup peer range <small>Vite 5는 Rollup 4를 기대하고 legacy plugin은 3.x를 요구합니다.</small></div>
    <div class="callout c3" data-annotation>선택 가능한 노드 <small>노드를 누르면 이웃과 경로가 남고 나머지는 흐려집니다.</small></div>
    <div class="legend"><span><i class="green"></i>direct</span><span><i class="blue"></i>transitive</span><span><i class="orange"></i>duplicate</span><span><i class="red"></i>conflict</span></div>
  </main>
  <script>
    const stage = document.querySelector(".stage");
    const cy = cytoscape({
      container: document.getElementById("cy"),
      wheelSensitivity: 0.16,
      elements: [
        { data: { id: "app", label: "app", type: "direct" } },
        { data: { id: "vite", label: "vite 5.2", type: "direct" } },
        { data: { id: "react", label: "react", type: "direct" } },
        { data: { id: "legacy", label: "plugin-legacy", type: "transitive" } },
        { data: { id: "rollup4", label: "rollup 4.x", type: "conflict" } },
        { data: { id: "rollup3", label: "rollup 3.x", type: "duplicate" } },
        { data: { id: "terser", label: "terser", type: "transitive" } },
        { data: { id: "esbuild", label: "esbuild", type: "transitive" } },
        { data: { id: "app-vite", source: "app", target: "vite", relation: "direct" } },
        { data: { id: "app-react", source: "app", target: "react", relation: "direct" } },
        { data: { id: "vite-rollup4", source: "vite", target: "rollup4", relation: "expects" } },
        { data: { id: "vite-esbuild", source: "vite", target: "esbuild", relation: "bundles" } },
        { data: { id: "legacy-rollup3", source: "legacy", target: "rollup3", relation: "peer" } },
        { data: { id: "legacy-terser", source: "legacy", target: "terser", relation: "uses" } },
        { data: { id: "app-legacy", source: "app", target: "legacy", relation: "direct" } },
        { data: { id: "range-conflict", source: "legacy", target: "rollup4", relation: "mismatch" } }
      ],
      style: [
        { selector: "node", style: {
          label: "data(label)", "text-valign": "center", "text-halign": "center", color: "#1f2924",
          "font-size": 14, "font-weight": 900, "background-color": "#fff", "border-width": 5,
          "border-color": "#71827a", width: 86, height: 86, "text-wrap": "wrap", "text-max-width": 72
        } },
        { selector: "node[type='direct']", style: { "border-color": "#10866f" } },
        { selector: "node[type='transitive']", style: { "border-color": "#2c69d8" } },
        { selector: "node[type='duplicate']", style: { "border-color": "#d98916" } },
        { selector: "node[type='conflict']", style: { "border-color": "#c94d4d", "border-width": 7 } },
        { selector: "edge", style: {
          width: 4, "line-color": "#aab6b0", "target-arrow-color": "#aab6b0", "target-arrow-shape": "triangle",
          "curve-style": "bezier", label: "data(relation)", "font-size": 11, "text-background-color": "#fbfcf8", "text-background-opacity": .82
        } },
        { selector: ".faded", style: { opacity: .18 } },
        { selector: "edge.selectedPath", style: { opacity: 1, "line-color": "#c94d4d", "target-arrow-color": "#c94d4d", width: 8 } },
        { selector: "node.selectedPath", style: { opacity: 1, "background-color": "#fff4f3", "border-color": "#c94d4d", "border-width": 8, width: 94, height: 94 } },
        { selector: ".neighbor", style: { opacity: 1, "border-width": 8, "background-color": "#eef7ff" } }
      ],
      layout: { name: "breadthfirst", directed: true, roots: "#app", spacingFactor: 1.18, avoidOverlap: true, padding: 125 }
    });

    cy.on("layoutstop", () => cy.fit(cy.elements(), 125));

    function clearFocus() {
      cy.elements().removeClass("faded selectedPath neighbor");
      stage.dataset.mode = "normal";
      stage.setAttribute("aria-label", "full dependency graph");
    }

    function showConflict() {
      const path = cy.$("#app, #vite, #legacy, #rollup4, #rollup3, #app-vite, #app-legacy, #vite-rollup4, #legacy-rollup3, #range-conflict");
      cy.elements().addClass("faded");
      path.removeClass("faded").addClass("selectedPath");
      cy.animate({ fit: { eles: path, padding: 110 } }, { duration: 250 });
      stage.dataset.mode = "conflict-path";
      stage.setAttribute("aria-label", "conflict path selected");
    }

    cy.on("tap", "node", (event) => {
      const node = event.target;
      const neighborhood = node.closedNeighborhood();
      cy.elements().addClass("faded").removeClass("neighbor selectedPath");
      neighborhood.removeClass("faded").addClass("neighbor");
      node.addClass("selectedPath");
      stage.dataset.mode = `selected-${node.id()}`;
      stage.setAttribute("aria-label", `selected ${node.data("label")}`);
    });

    document.querySelector("[data-eval-action]").addEventListener("click", showConflict);
    window.addEventListener("resize", () => cy.resize());
  </script>
</body>
</html>
